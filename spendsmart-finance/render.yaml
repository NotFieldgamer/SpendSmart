services:
  - type: web
    name: spendsmart-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false

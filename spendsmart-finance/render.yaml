services:
  - type: web
    name: spendsmart-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 7d
      # ── Set these manually in Render Dashboard → Environment ──────────────
      # MONGODB_URI  → your Atlas connection string
      # JWT_SECRET   → click "Generate" in Render for a secure value
      # CLIENT_URL   → your Vercel frontend URL (e.g. https://spendsmart.vercel.app)
